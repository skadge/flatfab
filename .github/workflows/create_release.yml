name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_release:
    name: "Create flatpak release"
    runs-on:  ubuntu-24.04

    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-5.15
      options: --privileged

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Flatpak building
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: flatfab.flatpak
          manifest-path: flatpak/com.flatfab.FlatFab.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: create_release
        uses: actions/create-release@v1
        id: create_release
        with:
          draft: false
          prerelease: false
          release_name: Release ${{ github.ref }}
          tag_name: ${{ github.ref }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: upload linux artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./flatfab-x86_64.zip
          asset_name: FlatFab-${{ github.ref }} Flatpak
          asset_content_type: application/vnd.flatpak
